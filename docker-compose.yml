services:
  backend:
    build:
      context: ./backend
    container_name: nakamagate-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    # Para desarrollo: monta el código en caliente. Comenta esto si quieres
    # probar exactamente la imagen tal cual irá a producción.
    volumes:
      - ./backend:/app/backend

  # MySQL local opcional para desarrollo offline.
  # Por defecto el backend usa Aiven (vía backend/.env). Si quieres una BD local,
  # arranca este servicio con: docker compose --profile local up
  # y cambia DATABASE_URL en backend/.env a:
  #   mysql+pymysql://nakamagate_user:abc123.@mysql:3306/nakamagate
  mysql:
    profiles: ["local"]
    image: mysql:8.0
    container_name: nakamagate-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nakamagate
      MYSQL_USER: nakamagate_user
      MYSQL_PASSWORD: abc123.
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
