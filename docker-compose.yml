services:
  mysql:
    image: mysql:8.0
    container_name: nakamegate-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nakamegate
      MYSQL_USER: nakamegate_user
      MYSQL_PASSWORD: abc123.
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: