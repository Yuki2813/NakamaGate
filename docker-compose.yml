services:
  backend:
    build:
      context: ./backend
    container_name: nakamagate-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    # Para desarrollo: monta el código en caliente. Comenta esto si quieres
    # probar exactamente la imagen tal cual irá a producción.
    volumes:
      - ./backend:/app/backend

  mysql:
    image: mysql:8.0
    container_name: nakamagate-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nakamagate
      MYSQL_USER: nakamagate_user
      MYSQL_PASSWORD: abc123.
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
